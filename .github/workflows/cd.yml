name: CD

on:
  workflow_dispatch:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main

env:
  GCP_PROJECT_ID: "symfa-1669197925914"
  GCP_REGION: "europe-west3"
  GAR_REPOSITORY: "intake-iq"

jobs:
  publish-images:
    runs-on: ubuntu-latest
    name: Publish Docker Images
    permissions:
      contents: read
    strategy:
      matrix:
        target: [backend, frontend]
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Prepare registry settings
      id: prepare
      shell: bash
      run: |
        registry_host="${GCP_REGION}-docker.pkg.dev"
        image_repository="${registry_host}/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${{ matrix.target }}"

        {
          echo "registry_host=${registry_host}"
          echo "image_repository=${image_repository}"
        } >> "$GITHUB_OUTPUT"

    - name: Log in to Google Artifact Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ steps.prepare.outputs.registry_host }}
        username: _json_key
        password: ${{ secrets.GCP_SA_KEY }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ steps.prepare.outputs.image_repository }}
        tags: |
          type=raw,value=latest
          type=raw,value=${{ github.run_number }}

    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: ./${{ matrix.target }}
        file: ./${{ matrix.target }}/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
